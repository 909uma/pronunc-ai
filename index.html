<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRONUNC.AI — TED-Ed 발음교정</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Exo+2:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060b18;--bg2:#0d1526;
  --cyan:#00c9ff;--gold:#e2b96a;
  --text:#e8edf5;--muted:#5a7a99;
  --border:rgba(0,201,255,0.18);
  --red:#ff4757;--orange:#ff9f43;--yellow:#ffd32a;--green:#00ff88;
  --r:12px;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;font-size:15px;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.app{max-width:960px;margin:0 auto;padding:0 16px 60px}
.hdr{position:sticky;top:0;z-index:100;background:rgba(6,11,24,0.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;margin:0 -16px 20px}
.logo{display:flex;align-items:center;gap:9px}
.logo-ico{width:32px;height:32px;background:linear-gradient(135deg,#00c9ff,#0055ff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.logo-name{font-family:'Orbitron',monospace;font-size:13px;font-weight:600;color:var(--cyan);letter-spacing:2px}
.logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px}
.oscore{display:flex;align-items:center;gap:7px;background:rgba(0,201,255,0.07);border:1px solid var(--border);border-radius:20px;padding:4px 13px;font-size:11px;color:var(--muted)}
.oscore-val{font-family:'Orbitron',monospace;font-size:16px;font-weight:600}
.vinfo{text-align:center;margin-bottom:16px}
.vtag{font-size:10px;color:var(--gold);letter-spacing:3px;margin-bottom:4px}
.vtitle{font-family:'Orbitron',monospace;font-size:16px;font-weight:600;line-height:1.4;margin-bottom:2px}
.vauthor{font-size:11px;color:var(--muted)}
.setbar{display:flex;align-items:center;gap:7px;padding:7px 11px;background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:8px;margin-bottom:6px;font-size:12px;flex-wrap:wrap}
.slabel{color:var(--muted);white-space:nowrap}
.sinput{flex:1;min-width:150px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none}
.sinput:focus{border-color:var(--cyan)}
.sbtn{background:rgba(0,201,255,0.1);border:1px solid rgba(0,201,255,0.3);border-radius:6px;padding:5px 12px;color:var(--cyan);font-size:12px;cursor:pointer;white-space:nowrap;outline:none}
.sbtn:hover{background:rgba(0,201,255,0.2)}
.sbtn.gold{background:rgba(226,185,106,0.1);border-color:rgba(226,185,106,0.3);color:var(--gold)}
.sbtn.gold:hover{background:rgba(226,185,106,0.2)}
.ts-status{font-size:11px;padding:3px 8px;margin-bottom:14px;min-height:16px}
.ts-status.ok{color:var(--green)}.ts-status.err{color:var(--orange)}.ts-status.loading{color:var(--cyan)}
/* NAV */
.nav-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.nav-tab{background:transparent;border:none;border-bottom:2px solid transparent;padding:9px 18px;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:13px;cursor:pointer;transition:all 0.18s;outline:none;margin-bottom:-1px}
.nav-tab.on{color:var(--cyan);border-bottom-color:var(--cyan)}
.nav-tab:hover:not(.on){color:var(--text)}
/* STAGE TABS */
.stabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.stab{background:transparent;border:1px solid rgba(255,255,255,0.08);border-radius:var(--r);padding:10px 6px;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;text-align:center;line-height:1.4;outline:none}
.stab .si{font-size:18px;display:block;margin-bottom:2px}
.stab.on{background:rgba(0,201,255,0.1);border-color:var(--cyan);color:var(--cyan)}
.stab:hover:not(.on){background:rgba(255,255,255,0.04)}
/* PLAYER */
.player-box{border-radius:var(--r) var(--r) 0 0;overflow:hidden;border:1px solid var(--border);border-bottom:none;position:relative;padding-top:56.25%;background:#000}
#yt-player{position:absolute;top:0;left:0;width:100%;height:100%}
.stage-badge{position:absolute;top:12px;left:12px;z-index:10;background:rgba(0,0,0,0.6);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;color:var(--cyan);font-family:'Orbitron',monospace;letter-spacing:1px;pointer-events:none}
/* SUBTITLE */
.subbar{background:rgba(13,21,38,0.97);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:12px 22px;min-height:52px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.sub-txt{font-family:'JetBrains Mono',monospace;font-size:16px;text-align:center;color:#fff;text-shadow:0 0 16px rgba(0,201,255,0.35);line-height:1.7}
.sub-empty{color:var(--muted);font-size:13px;font-style:italic;text-align:center}
.hint-box{padding:11px 14px;background:rgba(0,201,255,0.04);border:1px solid rgba(0,201,255,0.1);border-radius:0 0 var(--r) var(--r);font-size:12px;color:var(--muted);line-height:1.7;border-top:none;margin-bottom:8px}
/* STAGE2 CONTROLS */
.s2ctrl{display:flex;align-items:center;gap:8px;padding:9px 14px;background:rgba(13,21,38,0.94);border:1px solid var(--border);border-top:none}
.s2btn{background:rgba(226,185,106,0.1);border:1px solid rgba(226,185,106,0.3);border-radius:7px;padding:6px 14px;color:var(--gold);font-size:12px;cursor:pointer;font-family:'Exo 2',sans-serif;transition:all 0.15s;outline:none}
.s2btn:hover{background:rgba(226,185,106,0.2)}
.s2btn.stop{background:rgba(255,71,87,0.1);border-color:rgba(255,71,87,0.3);color:var(--red)}
.s2btn.rst{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:var(--muted);padding:6px 10px}
.s2timer{font-family:'Orbitron',monospace;font-size:18px;font-weight:600;color:var(--cyan);min-width:58px}
.s2info{flex:1;font-size:11px;color:var(--muted);line-height:1.5}
/* PRACTICE */
.prac-layout{display:flex;gap:13px}
.sent-list{width:190px;flex-shrink:0;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:9px;max-height:600px;overflow-y:auto}
.slist-title{font-size:10px;color:var(--muted);letter-spacing:2px;padding:0 4px 7px}
.sitem{padding:6px 8px;border-radius:8px;margin-bottom:3px;cursor:pointer;transition:all 0.15s;border:1px solid transparent;display:flex;align-items:center;justify-content:space-between;gap:4px}
.sitem:hover{background:rgba(0,201,255,0.06)}.sitem.on{background:rgba(0,201,255,0.12);border-color:rgba(0,201,255,0.36)}
.snum{font-size:10px;color:var(--muted);margin-bottom:1px}.sprev{font-size:11px;color:#9abacc;line-height:1.3}
.sbadge{font-family:'Orbitron',monospace;font-size:11px;font-weight:600;flex-shrink:0}
.ppanel{flex:1;min-width:0}
.mode-row{display:flex;gap:6px;margin-bottom:11px}
.mbtn{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;text-align:center;outline:none}
.mbtn.on{background:rgba(226,185,106,0.09);border-color:var(--gold);color:var(--gold)}.mbtn:hover:not(.on){background:rgba(255,255,255,0.05)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 9px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;transition:all 0.13s;outline:none}
.chip.on{background:rgba(226,185,106,0.1);border-color:var(--gold);color:var(--gold)}.chip:hover:not(.on){background:rgba(255,255,255,0.07)}
.tcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 16px 13px;margin-bottom:10px;position:relative}
.tlabel{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px}
.ttext{font-family:'JetBrains Mono',monospace;font-size:17px;line-height:1.85;color:var(--text)}.ttext.lg{font-size:22px}
.tcard-btns{position:absolute;top:12px;right:12px;display:flex;gap:5px}
.lbtn{background:rgba(226,185,106,0.09);border:1px solid rgba(226,185,106,0.28);border-radius:7px;padding:4px 10px;color:var(--gold);font-size:11px;cursor:pointer;transition:all 0.15s;outline:none}
.lbtn:hover{background:rgba(226,185,106,0.18)}
.lbtn.slow{background:rgba(0,201,255,0.07);border-color:rgba(0,201,255,0.25);color:var(--cyan)}.lbtn.slow:hover{background:rgba(0,201,255,0.15)}
/* SYLLABLE */
.syl-wrap{margin-bottom:10px}.syl-label{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:5px}
.syl-row{display:flex;flex-wrap:wrap;gap:4px}
.syl{padding:3px 7px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--muted)}
.syl.hit{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.3);color:var(--green)}.syl.miss{background:rgba(255,71,87,0.1);border-color:rgba(255,71,87,0.3);color:var(--red)}
/* RECORD */
.recarea{text-align:center;margin-bottom:13px}
.recbtn{width:66px;height:66px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:23px;cursor:pointer;border:2px solid var(--cyan);background:rgba(0,201,255,0.08);transition:all 0.2s;outline:none}
.recbtn:hover{transform:scale(1.07);background:rgba(0,201,255,0.14)}
.recbtn.rec{border-color:var(--red);background:rgba(255,71,87,0.1);animation:pulse 1.1s ease-in-out infinite}
.rechint{font-size:11px;color:var(--muted);margin-top:6px}
/* RESULT */
.rcard{background:var(--bg2);border-radius:var(--r);padding:15px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.07)}
.rtop{display:flex;align-items:center;gap:14px;margin-bottom:11px}
.ring-w{position:relative;width:66px;height:66px;flex-shrink:0}.ring-w svg{transform:rotate(-90deg)}
.ring-c{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:16px;font-weight:600}
.rlabel{font-size:15px;font-weight:600;margin-bottom:3px}.spoken{font-size:11px;color:var(--muted);font-family:'JetBrains Mono'}.rstats{font-size:11px;color:var(--muted);margin-top:2px}
.wchips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.wc{padding:3px 8px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12px;display:inline-flex;align-items:center;gap:2px}
.wc.ok{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.24);color:var(--green)}.wc.ng{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.24);color:var(--red)}
.tipbox{margin-top:8px;padding:8px 10px;background:rgba(0,201,255,0.05);border-radius:8px;font-size:12px;color:var(--muted);line-height:1.75}
.navrow{display:flex;justify-content:space-between;gap:7px;margin-top:11px}
.nbtn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:8px;padding:7px 15px;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:13px;cursor:pointer;transition:all 0.15s;outline:none}
.nbtn.nxt{background:rgba(0,201,255,0.08);border-color:rgba(0,201,255,0.28);color:var(--cyan)}
.nbtn:disabled{opacity:0.26;cursor:not-allowed}.nbtn:not(:disabled):hover{opacity:0.8;transform:translateY(-1px)}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-val{font-family:'Orbitron',monospace;font-size:22px;font-weight:600;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:1px}
.chart-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.chart-title{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.4s ease;min-height:4px}
.bar-lbl{font-size:9px;color:var(--muted);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.bar-val{font-family:'Orbitron',monospace;font-size:10px;color:var(--text)}
.weak-list{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.weak-title{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:12px}
.weak-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.weak-item:last-child{border-bottom:none}
.weak-word{font-family:'JetBrains Mono',monospace;font-size:13px}
.weak-bar-wrap{flex:1;margin:0 12px;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.weak-bar{height:100%;border-radius:3px}
.weak-pct{font-family:'Orbitron',monospace;font-size:11px;min-width:32px;text-align:right}
.no-stats{text-align:center;padding:40px;color:var(--muted);font-size:13px;line-height:2}
@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,71,87,0.35)}50%{transform:scale(1.06);box-shadow:0 0 0 7px rgba(255,71,87,0)}}
@keyframes fin{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.fin{animation:fin 0.26s ease forwards}
@media(max-width:640px){.prac-layout{flex-direction:column}.sent-list{width:100%;max-height:110px}.vtitle{font-size:13px}.stats-grid{grid-template-columns:repeat(2,1fr)}.setbar{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <div class="logo">
    <div class="logo-ico">🎯</div>
    <div><div class="logo-name">PRONUNC.AI</div><div class="logo-sub">TED-Ed 발음교정</div></div>
  </div>
  <div class="oscore" id="oscore-wrap" style="display:none">
    <span>종합</span><span class="oscore-val" id="oscore-val">—</span>
  </div>
</header>

<div class="nav-tabs">
  <button class="nav-tab on" onclick="setPage('learn')" id="page-learn">📚 학습</button>
  <button class="nav-tab" onclick="setPage('stats')" id="page-stats">📊 통계</button>
</div>

<!-- LEARN PAGE -->
<div id="page-learn-content">
  <div class="vinfo">
    <div class="vtag">TED-Ed</div>
    <div class="vtitle">What Would Happen If You Didn't Sleep?</div>
    <div class="vauthor">Claudia Aguirre · TED-Ed</div>
  </div>
  <div class="setbar">
    <span class="slabel">📺 YouTube ID:</span>
    <input class="sinput" id="vid-input" value="dqONk48l5vY" placeholder="YouTube Video ID">
    <button class="sbtn" onclick="changeVideo()">영상 변경</button>
    <button class="sbtn gold" onclick="autoLoadTranscript()">⚡ 자막 자동로드</button>
  </div>
  <div class="ts-status" id="ts-status"></div>

  <div class="stabs">
    <button class="stab on" onclick="setStage(1)" id="tab-1"><span class="si">🎬</span>1단계<br><small>무자막 시청</small></button>
    <button class="stab" onclick="setStage(2)" id="tab-2"><span class="si">📝</span>2단계<br><small>자막 싱크</small></button>
    <button class="stab" onclick="setStage(3)" id="tab-3"><span class="si">🎤</span>3단계<br><small>발음 연습</small></button>
  </div>

  <div id="vsection">
    <div class="player-box">
      <div class="stage-badge" id="stage-badge">1단계 · 무자막</div>
      <div id="yt-player"></div>
    </div>
    <div class="s2ctrl" id="s2ctrl" style="display:none">
      <button class="s2btn" id="s2play" onclick="syncStart()">▶ 싱크 시작</button>
      <button class="s2btn stop" id="s2stop" onclick="syncStop()" style="display:none">■ 정지</button>
      <button class="s2btn rst" onclick="syncReset()">↺</button>
      <div class="s2timer" id="s2timer">0:00</div>
      <div class="s2info">YouTube 재생 시작과 동시에 싱크 버튼을 누르세요</div>
    </div>
    <div class="subbar" id="subbar" style="display:none">
      <div id="sub-content" class="sub-empty">싱크 시작 후 자막이 표시됩니다</div>
    </div>
    <div class="hint-box" id="hint1">
      💡 <strong style="color:var(--text)">1단계:</strong> 자막 없이 영상 전체를 시청하며 전체 흐름을 파악하세요. 완료 후 2단계로 넘어가세요.
    </div>
  </div>

  <div id="psection" style="display:none">
    <div class="prac-layout">
      <div class="sent-list">
        <div class="slist-title">문장 목록</div>
        <div id="sent-items"></div>
      </div>
      <div class="ppanel">
        <div class="mode-row">
          <button class="mbtn on" onclick="setMode('word')" id="mode-word">🔤 단어별</button>
          <button class="mbtn" onclick="setMode('chunk')" id="mode-chunk">📖 청크별</button>
          <button class="mbtn" onclick="setMode('sentence')" id="mode-sentence">📜 전체 문장</button>
        </div>
        <div id="chips-area"></div>
        <div class="tcard">
          <div class="tlabel">목표 텍스트</div>
          <div class="ttext" id="target-display">...</div>
          <div class="tcard-btns">
            <button class="lbtn slow" onclick="listenTTS(0.6)">🐢 느리게</button>
            <button class="lbtn" onclick="listenTTS(0.88)">🔊 원본</button>
          </div>
        </div>
        <div id="syl-area"></div>
        <div class="recarea">
          <button class="recbtn" id="recbtn" onclick="toggleRec()">🎤</button>
          <div class="rechint" id="rechint">버튼을 클릭하여 발음 녹음 시작</div>
        </div>
        <div id="result-area"></div>
        <div class="navrow">
          <button class="nbtn" id="prev-btn" onclick="goSent(-1)">← 이전 문장</button>
          <button class="nbtn nxt" id="next-btn" onclick="goSent(1)">다음 문장 →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STATS PAGE -->
<div id="page-stats-content" style="display:none">
  <div id="stats-body"></div>
</div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ── DEFAULT TRANSCRIPT ──
const DEFAULT_TR=[
  {id:0,start:7,end:13,text:"In 1965, 17-year-old Randy Gardner stayed awake for 264 hours.",chunks:["In 1965,","17-year-old Randy Gardner","stayed awake for 264 hours."],words:["In","1965,","17-year-old","Randy","Gardner","stayed","awake","for","264","hours."]},
  {id:1,start:14,end:20,text:"That's 11 days to see how a human body would cope without sleep.",chunks:["That's 11 days","to see how a human body","would cope without sleep."],words:["That's","11","days","to","see","how","a","human","body","would","cope","without","sleep."]},
  {id:2,start:21,end:27,text:"On the second day, his eyes stopped focusing.",chunks:["On the second day,","his eyes stopped focusing."],words:["On","the","second","day,","his","eyes","stopped","focusing."]},
  {id:3,start:28,end:34,text:"Next, he lost the ability to identify objects by touch.",chunks:["Next,","he lost the ability","to identify objects by touch."],words:["Next,","he","lost","the","ability","to","identify","objects","by","touch."]},

// ── STATE ──
let VID='dqONk48l5vY', TRANSCRIPT=[...DEFAULT_TR];
let curStage=1, curPage='learn', sentIdx=0, mode='word', subIdx=0;
let isRec=false, recog=null, ytPlayer=null, ytReady=false;
let syncIv=null, syncStart0=null;
let scoreHistory={}, wordErrors={};

// ── PAGE ──
function setPage(p){
  curPage=p;
  ['learn','stats'].forEach(n=>{
    document.getElementById('page-'+n).classList.toggle('on',n===p);
    document.getElementById('page-'+n+'-content').style.display=n===p?'':'none';
  });
  if(p==='stats') renderStats();
}

// ── AUTO TRANSCRIPT LOAD ──
async function autoLoadTranscript(){
  const vid=document.getElementById('vid-input').value.trim()||VID;
  const st=document.getElementById('ts-status');
  st.className='ts-status loading'; st.textContent='⏳ 자막 자동 로딩 중...';
  try{
    const url=`https://www.youtube.com/api/timedtext?v=${vid}&lang=en&fmt=json3`;
    const res=await fetch(url);
    if(!res.ok) throw new Error('fetch failed');
    const json=await res.json();
    if(!json.events||json.events.length<3) throw new Error('no data');
    const lines=json.events.filter(e=>e.segs&&e.tStartMs!=null);
    const built=[];let buf='',bufStart=0,bufEnd=0,id=0;
    lines.forEach(e=>{
      const t=e.segs.map(s=>s.utf8).join('').replace(/\n/g,' ').trim();
      if(!t) return;
      if(!buf) bufStart=e.tStartMs/1000;
      buf+=(buf?' ':'')+t;
      bufEnd=(e.tStartMs+(e.dDurationMs||1500))/1000;
      if(buf.length>60||t.match(/[.!?]$/)){
        const words=buf.trim().split(/\s+/).filter(Boolean);
        const chunks=[];for(let i=0;i<words.length;i+=3)chunks.push(words.slice(i,i+3).join(' '));
        built.push({id:id++,start:+bufStart.toFixed(2),end:+bufEnd.toFixed(2),text:buf.trim(),chunks,words});
        buf='';
      }
    });
    if(buf.trim()){
      const words=buf.trim().split(/\s+/).filter(Boolean);
      const chunks=[];for(let i=0;i<words.length;i+=3)chunks.push(words.slice(i,i+3).join(' '));
      built.push({id:id++,start:+bufStart.toFixed(2),end:+bufEnd.toFixed(2),text:buf.trim(),chunks,words});
    }
    if(built.length<3) throw new Error('too short');
    TRANSCRIPT=built;scoreHistory={};wordErrors={};updateOverall();
    st.className='ts-status ok'; st.textContent=`✅ ${TRANSCRIPT.length}문장 자동 로드 완료!`;
    if(curStage===3){renderSentList();renderPractice();}
  }catch(e){
    st.className='ts-status err'; st.textContent='⚠️ 자동 로드 실패 (영문 자막 없음 또는 CORS 제한) — 기본 스크립트 사용 중';
    TRANSCRIPT=[...DEFAULT_TR];
  }
}

// ── YOUTUBE API ──
function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('yt-player',{
    videoId:VID,
    playerVars:{rel:0,cc_load_policy:0,iv_load_policy:3,modestbranding:1,fs:1},
    events:{onReady:()=>{ytReady=true;}}
  });
}

// ── STAGE ──
function setStage(n){
  curStage=n;
  [1,2,3].forEach(i=>document.getElementById('tab-'+i).classList.toggle('on',i===n));
  clearInterval(syncIv);syncIv=null;
  if(n!==2){syncStop();}
  document.getElementById('vsection').style.display=n<=2?'':'none';
  document.getElementById('psection').style.display=n===3?'':'none';
  document.getElementById('hint1').style.display=n===1?'':'none';
  document.getElementById('s2ctrl').style.display=n===2?'':'none';
  document.getElementById('subbar').style.display=n===2?'':'none';
  const badge=document.getElementById('stage-badge');
  if(n===1){badge.textContent='1단계 · 무자막';badge.style.color='var(--cyan)';}
  else if(n===2){badge.textContent='2단계 · 자막 싱크';badge.style.color='var(--gold)';}
  if(n===2) syncReset();
  if(n===3){renderSentList();renderPractice();}
}

// ── SYNC ──
function syncStart(){
  syncStart0=Date.now();
  if(ytReady&&ytPlayer){try{ytPlayer.seekTo(0);ytPlayer.playVideo();}catch(e){}}
  document.getElementById('s2play').style.display='none';
  document.getElementById('s2stop').style.display='';
  syncIv=setInterval(()=>{
    const el=(Date.now()-syncStart0)/1000;
    const m=Math.floor(el/60),s=String(Math.floor(el%60)).padStart(2,'0');
    document.getElementById('s2timer').textContent=m+':'+s;
    const sub=TRANSCRIPT.find(t=>el>=t.start&&el<t.end);
    const ec=document.getElementById('sub-content');
    if(sub){ec.className='sub-txt';ec.textContent=sub.text;}
    else{ec.className='sub-empty';ec.textContent='자막 대기 중...';}
  },100);
}
function syncStop(){
  clearInterval(syncIv);syncIv=null;
  const sp=document.getElementById('s2play'),ss=document.getElementById('s2stop');
  if(sp)sp.style.display='';if(ss)ss.style.display='none';
  if(ytReady&&ytPlayer){try{ytPlayer.pauseVideo();}catch(e){}}
}
function syncReset(){
  syncStop();syncStart0=null;
  const st=document.getElementById('s2timer'),sc=document.getElementById('sub-content');
  if(st)st.textContent='0:00';
  if(sc){sc.className='sub-empty';sc.textContent='싱크 시작 후 자막이 표시됩니다';}
  if(ytReady&&ytPlayer){try{ytPlayer.seekTo(0);ytPlayer.stopVideo();}catch(e){}}
}

// ── SYLLABLE SPLITTER ──
function splitSyl(word){
  const w=word.toLowerCase().replace(/[^a-z]/g,'');
  if(w.length<=3) return [word];
  const V='aeiouy';const parts=[];let cur='';
  for(let i=0;i<w.length;i++){
    cur+=w[i];
    if(i<w.length-2&&V.includes(w[i])&&!V.includes(w[i+1])&&V.includes(w[i+2])){parts.push(cur);cur='';}
  }
  if(cur)parts.push(cur);
  return parts.length>1?parts:[word];
}

// ── PRACTICE ──
const norm=t=>t.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(Boolean);
function calcScore(sp,tg){
  const sw=norm(sp),tw=norm(tg);if(!tw.length)return 0;
  let m=0;const u=new Set();
  sw.forEach(w=>{const i=tw.findIndex((v,idx)=>!u.has(idx)&&v===w);if(i!==-1){m++;u.add(i);}});
  return Math.round((m/tw.length)*100);
}
function getWR(sp,tg){return tg.trim().split(/\s+/).map(w=>({word:w,ok:norm(sp).includes(w.toLowerCase().replace(/[^a-z]/g,''))}));}
const sColor=s=>s>=85?'var(--green)':s>=70?'var(--yellow)':s>=50?'var(--orange)':'var(--red)';
const sEmoji=s=>s>=85?'🎉 완벽해요!':s>=70?'👍 잘 했어요!':s>=50?'💪 조금 더!':'🔄 다시 해봐요';
function getTarget(){
  const s=TRANSCRIPT[sentIdx];if(!s)return '';
  if(mode==='sentence')return s.text;
  if(mode==='chunk')return s.chunks[Math.min(subIdx,s.chunks.length-1)];
  return s.words[Math.min(subIdx,s.words.length-1)];
}

function renderSentList(){
  document.getElementById('sent-items').innerHTML=TRANSCRIPT.map((s,i)=>{
    const h=scoreHistory[i]||[],best=h.length?Math.max(...h):null;
    return`<div class="sitem ${i===sentIdx?'on':''}" onclick="jumpTo(${i})">
      <div><div class="snum">#${i+1}</div><div class="sprev">${s.text.substring(0,24)}…</div></div>
      ${best!==null?`<div class="sbadge" style="color:${sColor(best)}">${best}</div>`:''}
    </div>`;
  }).join('');
}

function renderPractice(){
  ['word','chunk','sentence'].forEach(m=>document.getElementById('mode-'+m).classList.toggle('on',m===mode));
  const s=TRANSCRIPT[sentIdx];if(!s)return;
  const items=mode==='word'?s.words:mode==='chunk'?s.chunks:[];
  document.getElementById('chips-area').innerHTML=items.length
    ?`<div class="chips">${items.map((it,i)=>`<button class="chip ${i===subIdx?'on':''}" onclick="setSubIdx(${i})">${it}</button>`).join('')}</div>`:'';
  const tgt=getTarget();
  const td=document.getElementById('target-display');
  td.textContent=tgt;td.className='ttext'+(mode==='word'?' lg':'');
  // syllables
  const sylHtml=tgt.trim().split(/\s+/).map(w=>splitSyl(w).map(sy=>`<span class="syl">${sy}</span>`).join('·')).join(' ');
  document.getElementById('syl-area').innerHTML=`<div class="syl-wrap"><div class="syl-label">음절 분석</div><div class="syl-row">${sylHtml}</div></div>`;
  document.getElementById('result-area').innerHTML='';
  document.getElementById('prev-btn').disabled=sentIdx===0;
  document.getElementById('next-btn').disabled=sentIdx===TRANSCRIPT.length-1;
}

function jumpTo(i){sentIdx=i;subIdx=0;isRec=false;recog&&recog.stop();renderSentList();renderPractice();}
function goSent(d){const n=sentIdx+d;if(n<0||n>=TRANSCRIPT.length)return;jumpTo(n);}
function setMode(m){mode=m;subIdx=0;document.getElementById('result-area').innerHTML='';renderPractice();}
function setSubIdx(i){subIdx=i;document.getElementById('result-area').innerHTML='';renderPractice();}

function listenTTS(rate){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(getTarget());
  u.lang='en-US';u.rate=rate||0.88;u.pitch=1.0;
  speechSynthesis.speak(u);
}

// ── SPEECH REC ──
function toggleRec(){
  if(isRec){recog&&recog.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('rechint').innerHTML='⚠️ Chrome 브라우저를 사용해주세요';return;}
  recog=new SR();recog.lang='en-US';recog.continuous=false;recog.interimResults=false;
  const tgt=getTarget();
  recog.onresult=e=>handleResult(e.results[0][0].transcript,e.results[0][0].confidence,tgt);
  recog.onerror=()=>setRecBtn(false);recog.onend=()=>setRecBtn(false);
  setRecBtn(true);recog.start();
}
function setRecBtn(on){
  isRec=on;const b=document.getElementById('recbtn');
  b.classList.toggle('rec',on);b.textContent=on?'⏹':'🎤';
  document.getElementById('rechint').textContent=on?'🔴 녹음 중... 클릭하여 중지':'버튼을 클릭하여 발음 녹음 시작';
}
function handleResult(spoken,conf,target){
  const s=calcScore(spoken,target),wr=getWR(spoken,target);
  scoreHistory[sentIdx]=[...(scoreHistory[sentIdx]||[]),s];
  wr.forEach(({word,ok})=>{
    const k=word.toLowerCase().replace(/[^a-z]/g,'');if(!k)return;
    if(!wordErrors[k])wordErrors[k]={attempts:0,misses:0};
    wordErrors[k].attempts++;if(!ok)wordErrors[k].misses++;
  });
  updateOverall();renderSentList();renderResult(spoken,s,wr,conf);
}
function renderResult(spoken,score,wr,conf){
  const hist=scoreHistory[sentIdx]||[],best=Math.max(...hist);
  const c=sColor(score),circ=2*Math.PI*28,off=circ*(1-score/100);
  const tgt=getTarget();const spW=norm(spoken);
  const sylHL=tgt.trim().split(/\s+/).map(w=>{
    const hit=spW.includes(w.toLowerCase().replace(/[^a-z]/g,''));
    return splitSyl(w).map(sy=>`<span class="syl ${hit?'hit':'miss'}">${sy}</span>`).join('·');
  }).join(' ');
  document.getElementById('result-area').innerHTML=`
    <div class="rcard fin" style="border-color:${c}33">
      <div class="rtop">
        <div class="ring-w">
          <svg width="66" height="66" viewBox="0 0 66 66">
            <circle cx="33" cy="33" r="28" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="5"/>
            <circle cx="33" cy="33" r="28" fill="none" stroke="${c}" stroke-width="5"
              stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" stroke-linecap="round"/>
          </svg>
          <div class="ring-c" style="color:${c}">${score}</div>
        </div>
        <div>
          <div class="rlabel" style="color:${c}">${sEmoji(score)}</div>
          <div class="spoken">인식: "${spoken}"</div>
          <div class="rstats">최고 <strong style="color:${c}">${best}점</strong> · ${hist.length}회 시도${conf?` · 신뢰도 ${Math.round(conf*100)}%`:''}</div>
        </div>
      </div>
      <div class="syl-label" style="margin-bottom:5px">음절별 정확도</div>
      <div class="syl-row" style="margin-bottom:10px">${sylHL}</div>
      <div class="wchips">${wr.map(w=>`<span class="wc ${w.ok?'ok':'ng'}">${w.ok?'✓':'✗'} ${w.word}</span>`).join('')}</div>
      ${score<70?`<div class="tipbox">💡 <strong style="color:var(--text)">팁:</strong> 🐢 느리게 듣기로 발음을 먼저 익히고 <strong style="color:var(--gold)">단어별 → 청크별 → 전체 문장</strong> 순으로 연습하세요.</div>`:''}
    </div>`;
}

// ── STATS ──
function renderStats(){
  const body=document.getElementById('stats-body');
  const all=Object.values(scoreHistory).flat();
  if(!all.length){
    body.innerHTML='<div class="no-stats">📊 아직 학습 기록이 없습니다.<br>3단계 발음 연습을 먼저 시작해보세요!</div>';return;
  }
  const avg=Math.round(all.reduce((a,b)=>a+b,0)/all.length);
  const best=Math.max(...all);
  const barData=TRANSCRIPT.map((s,i)=>{const h=scoreHistory[i]||[];return{label:'#'+(i+1),val:h.length?Math.max(...h):null};}).filter(d=>d.val!==null);
  const weakWords=Object.entries(wordErrors).filter(([,v])=>v.attempts>=2)
    .map(([w,v])=>({word:w,rate:Math.round((v.misses/v.attempts)*100)}))
    .sort((a,b)=>b.rate-a.rate).slice(0,8);
  body.innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" style="color:${sColor(avg)}">${avg}</div><div class="stat-lbl">평균 점수</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">${best}</div><div class="stat-lbl">최고 점수</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--cyan)">${all.length}</div><div class="stat-lbl">총 시도 횟수</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--gold)">${Object.keys(scoreHistory).length}</div><div class="stat-lbl">연습 문장 수</div></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">문장별 최고점수</div>
      <div class="bar-chart">
        ${barData.map(d=>`<div class="bar-col">
          <div class="bar-val">${d.val}</div>
          <div class="bar" style="height:${d.val}%;background:${sColor(d.val)}"></div>
          <div class="bar-lbl">${d.label}</div>
        </div>`).join('')}
      </div>
    </div>
    ${weakWords.length?`<div class="weak-list">
      <div class="weak-title">취약 단어 TOP ${weakWords.length}</div>
      ${weakWords.map(w=>`<div class="weak-item">
        <div class="weak-word">${w.word}</div>
        <div class="weak-bar-wrap"><div class="weak-bar" style="width:${w.rate}%;background:${sColor(100-w.rate)}"></div></div>
        <div class="weak-pct" style="color:${sColor(100-w.rate)}">${w.rate}%</div>
      </div>`).join('')}
    </div>`:''}`;
}

function updateOverall(){
  const all=Object.values(scoreHistory).flat();if(!all.length)return;
  const avg=Math.round(all.reduce((a,b)=>a+b,0)/all.length);
  document.getElementById('oscore-wrap').style.display='';
  const v=document.getElementById('oscore-val');v.textContent=avg;v.style.color=sColor(avg);
}
function changeVideo(){
  const id=document.getElementById('vid-input').value.trim();if(!id)return;
  VID=id;scoreHistory={};wordErrors={};
  document.getElementById('ts-status').textContent='';
  updateOverall();TRANSCRIPT=[...DEFAULT_TR];
  if(ytReady&&ytPlayer){try{ytPlayer.loadVideoById(id);ytPlayer.stopVideo();}catch(e){}}
  if(curStage===3)renderSentList();
  syncReset();
}

setStage(1);
</script>
